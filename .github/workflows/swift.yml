name: Swift Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  swift-build-and-test:
    name: Swift Build and Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
