name: App Artifact

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-app-artifact:
    name: Build App Artifact
    runs-on: macos-15
    env:
      DEVELOPER_ID_CERTIFICATE_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
      DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
      DEVELOPER_ID_KEYCHAIN_PASSWORD: ${{ secrets.DEVELOPER_ID_KEYCHAIN_PASSWORD }}
      KEYSCOUT_CODESIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION_IDENTITY }}
      KEYSCOUT_NOTARIZE: ${{ secrets.KEYSCOUT_NOTARIZE }}
      KEYSCOUT_NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
      KEYSCOUT_NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
      KEYSCOUT_NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Import Developer ID certificate
        if: ${{ env.DEVELOPER_ID_CERTIFICATE_P12_BASE64 != '' }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/keyscout-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"

          echo "$DEVELOPER_ID_CERTIFICATE_P12_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$DEVELOPER_ID_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$DEVELOPER_ID_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$DEVELOPER_ID_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Package app artifact
        env:
          KEYSCOUT_CODESIGN_IDENTITY: ${{ env.KEYSCOUT_CODESIGN_IDENTITY || '-' }}
          KEYSCOUT_NOTARIZE: ${{ env.KEYSCOUT_NOTARIZE || '0' }}
          KEYSCOUT_NOTARY_APPLE_ID: ${{ env.KEYSCOUT_NOTARY_APPLE_ID }}
          KEYSCOUT_NOTARY_TEAM_ID: ${{ env.KEYSCOUT_NOTARY_TEAM_ID }}
          KEYSCOUT_NOTARY_PASSWORD: ${{ env.KEYSCOUT_NOTARY_PASSWORD }}
        run: scripts/package_app.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeyScout-app
          path: |
            dist/artifacts/KeyScout.app.zip
            dist/artifacts/KeyScout.app.zip.sha256
          if-no-files-found: error
