name: Feature request
description: Suggest an improvement for KeyScout
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an improvement.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like KeyScout to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, tools, or workarounds you have tried.
    validations:
      required: false
  - type: textarea
    id: privacy
    attributes:
      label: Privacy or permission impact
      description: Note whether this might require network access, Accessibility permissions, stored data, imports, or exports.
    validations:
      required: false
